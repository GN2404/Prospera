<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Create Your Account — Prospera</title>
  <meta name="description" content="Get early access to Prospera — financial intelligence tools built for Singapore SMEs." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0b0f;
      --surface: #11131a;
      --text: #f5f7fa;
      --text-muted: #9aa3af;
      --accent: #4f8cff;
      --border: rgba(255,255,255,0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .logo {
      text-align: center;
      font-weight: 700;
      font-size: 20px;
      margin-bottom: 32px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 12px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .card {
      background: var(--surface);
      padding: 28px;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    input, select {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0f1117;
      color: var(--text);
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .footer-text {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .footer-text a {
      color: var(--accent);
      text-decoration: none;
    }

    .success {
      display: none;
      text-align: center;
    }

    .success.active {
      display: block;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo">Prospera</div>

    <h1>Get Early Access</h1>
    <p class="subtitle">
      Financial intelligence tools built for Singapore SMEs.
    </p>

    <div class="card">

      <form id="signupForm">

        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" required />
        </div>

        <div class="form-group">
          <label for="email">Work Email</label>
          <input id="email" type="email" required />
        </div>

        <div class="form-group">
          <label for="company">Company Name</label>
          <input id="company" type="text" required />
        </div>

        <div class="form-group">
          <label for="industry">Industry</label>
          <select id="industry" required>
            <option value="">Select industry</option>
            <option>Technology</option>
            <option>Financial Services</option>
            <option>Healthcare &amp; Medical</option>
            <option>Professional Services</option>
            <option>Retail</option>
            <option>Manufacturing</option>
            <option>Logistics &amp; Supply Chain</option>
            <option>Real Estate</option>
            <option>Food &amp; Beverage</option>
            <option>Hospitality &amp; Tourism</option>
            <option>Creative &amp; Media</option>
            <option>Other</option>
          </select>
        </div>

        <button class="btn" type="submit">Request Access</button>

      </form>

      <div id="successMessage" class="success">
        <h3>You're on the list</h3>
        <p class="subtitle">We'll invite you when access opens.</p>
      </div>

    </div>

    <div class="footer-text">
      Already have access? <a href="#">Log in</a>
    </div>

  </div>

  <script>
    const form = document.getElementById("signupForm");
    const success = document.getElementById("successMessage");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      form.style.display = "none";
      success.classList.add("active");
    });
  </script>

</body>
</html>
